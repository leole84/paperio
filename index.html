<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper.io Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f0f0;
    color: #222;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen { display: none; width: 100%; max-width: 440px; padding: 24px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 3rem;
    letter-spacing: -1px;
    color: #222;
  }
  .logo span { color: #ff3366; }
  .subtitle { color: #999; font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; }

  .input-group { width: 100%; display: flex; flex-direction: column; gap: 7px; }
  label { font-size: .72rem; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  input[type=text] {
    width: 100%; background: #fff;
    border: 1.5px solid #ddd; border-radius: 8px;
    padding: 11px 14px; color: #222;
    font-size: 1rem; font-family: inherit; outline: none;
    transition: border-color .2s;
  }
  input[type=text]:focus { border-color: #ff3366; }

  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .color-btn.selected { border-color: #222; transform: scale(1.2); }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 1rem; font-family: 'Black Han Sans', sans-serif;
    cursor: pointer; letter-spacing: 1px; transition: transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: #ff3366; color: #fff; }
  .btn-secondary { background: #fff; color: #333; border: 1.5px solid #ddd; }

  /* LOBBY */
  .room-code-display {
    background: #fff; border: 1.5px solid #eee;
    border-radius: 12px; padding: 18px; width: 100%; text-align: center;
  }
  .room-code-display .label { font-size: .68rem; color: #aaa; letter-spacing: 2px; margin-bottom: 6px; }
  .room-code-display .code {
    font-family: 'Black Han Sans', sans-serif; font-size: 2.4rem;
    letter-spacing: 8px; color: #ff3366;
  }
  .player-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .player-item {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 1.5px solid #eee;
    border-radius: 8px; padding: 10px 14px;
  }
  .player-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
  .player-name { flex: 1; font-size: .92rem; }
  .player-badge { font-size: .62rem; color: #aaa; border: 1px solid #ddd; border-radius: 4px; padding: 2px 6px; }
  .status-msg { font-size: .78rem; color: #aaa; text-align: center; }

  /* GAME CONTAINER */
  #screen-game {
    display: none; width: 100vw; max-width: 100vw;
    height: 100vh; padding: 0; position: relative; flex-direction: column;
  }
  #screen-game.active { display: flex; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px;
    background: rgba(255,255,255,.92);
    border-bottom: 1px solid #eee;
    backdrop-filter: blur(8px);
    z-index: 20; pointer-events: none;
    gap: 10px;
  }
  #hud-left { display: flex; align-items: center; gap: 8px; }
  #hud-name { font-family: 'Black Han Sans', sans-serif; font-size: .95rem; }
  #hud-rank {
    border-radius: 20px; padding: 2px 10px;
    font-size: .72rem; font-weight: 700;
    background: #f0f0f0; color: #555;
  }
  #hud-rank.rank1 { background: #ffd700; color: #664400; }
  #hud-rank.rank2 { background: #c0c0c0; color: #333; }
  #hud-rank.rank3 { background: #cd7f32; color: #fff; }
  #hud-score { font-size: .88rem; font-weight: 700; }
  #hud-time { font-size: .85rem; color: #888; font-variant-numeric: tabular-nums; }

  /* LEADERBOARD */
  #leaderboard {
    position: absolute; top: 48px; right: 10px;
    background: rgba(255,255,255,.93);
    border: 1px solid #eee;
    border-radius: 12px; padding: 10px 14px; min-width: 150px;
    z-index: 20; pointer-events: none;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  #leaderboard h4 { font-size: .6rem; color: #bbb; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
  .lb-item { display: flex; align-items: center; gap: 7px; font-size: .78rem; margin-bottom: 5px; }
  .lb-item.dead { opacity: .35; }
  .lb-num { font-size: .65rem; color: #bbb; width: 12px; text-align: right; }
  .lb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 72px; color: #333; }
  .lb-pct { font-size: .72rem; font-weight: 700; }

  /* CANVAS WRAPPER (크기 버그 수정 핵심) */
  .canvas-wrapper {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 5; background: #eaeee0;
  }
  canvas { display: block; max-width: 100%; max-height: 100%; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
  #particleCanvas { position: absolute; pointer-events: none; z-index: 10; }

  /* D-PAD */
  #dpad {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 4px; z-index: 25;
  }
  .dpad-btn {
    background: rgba(255,255,255,0.75); border: 1.5px solid rgba(0,0,0,.1);
    border-radius: 10px; color: #555; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(4px); box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .dpad-btn.pressed { background: rgba(255,51,102,.15); border-color: #ff3366; color: #ff3366; }
  .dpad-empty { background: none; border: none; pointer-events: none; }

  /* GAME OVER */
  #screen-gameover { gap: 20px; background: #fff; border-radius: 16px; box-shadow: 0 4px 30px rgba(0,0,0,.1); }
  .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; text-align: center; }
  .result-title.win { color: #ff3366; }
  .result-title.lose { color: #888; }
  .result-stats { width: 100%; }
  .stat-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid #f0f0f0; font-size: .88rem; color: #444;
  }
  .stat-row span:last-child { font-weight: 700; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.75); color: #fff;
    padding: 9px 18px; border-radius: 20px; font-size: .83rem;
    z-index: 999; pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  #toast.show { opacity: 1; }

  /* COUNTDOWN */
  #countdown {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; z-index: 50;
    background: rgba(255,255,255,.7); backdrop-filter: blur(4px);
  }
  #countdown.show { display: flex; }
  #countdown-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 8rem; color: #ff3366;
    animation: countPop .8s ease;
  }
  @keyframes countPop {
    0% { transform: scale(2); opacity: 0; }
    50% { transform: scale(1); opacity: 1; }
    100% { transform: scale(.9); opacity: .8; }
  }
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, onDisconnect, update, remove, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJYWUGB3-onRqeuRORgqup9253DM4dVW4",
  authDomain: "mypaperio-9a975.firebaseapp.com",
  databaseURL: "https://mypaperio-9a975-default-rtdb.firebaseio.com",
  projectId: "mypaperio-9a975",
  storageBucket: "mypaperio-9a975.firebasestorage.app",
  messagingSenderId: "40231877042",
  appId: "1:40231877042:web:7ce90a3093a180a0ed0cab"
};

// ── CONSTANTS ──
const GRID = 80;
const GAME_DURATION = 120;
const TICK_MS = 140;
const PLAYER_COLORS = ['#ff3366','#3399ff','#ffcc00','#aa44ff','#ff6600','#00cc88'];

// ── STATE ──
let app, db;
let myId = null, roomId = null, isHost = false;
let gameLoopInterval = null, timerInterval = null;
let timeLeft = GAME_DURATION;
let myDir = 'RIGHT', pendingDir = null;
let players = {}, grid = [];
let gameRunning = false;
let selectedColor = PLAYER_COLORS[0];

// canvas 변수명 일치 작업
let canvas, ctx, particleCanvas, pCtx;
let particles = [];
let mouseAngle = 0;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  try { app = initializeApp(firebaseConfig); db = getDatabase(app); }
  catch(e) { alert('Firebase 오류: ' + e.message); return; }

  canvas         = document.getElementById('gameCanvas');
  ctx            = canvas.getContext('2d');
  particleCanvas = document.getElementById('particleCanvas');
  pCtx           = particleCanvas.getContext('2d');

  setupColorPicker();
  setupButtons();
  setupInput();
  showScreen('title');
});

// ── UI ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'game') resizeCanvas();
}
function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── COLOR PICKER ──
function setupColorPicker() {
  const picker = document.getElementById('colorPicker');
  PLAYER_COLORS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (i===0?' selected':'');
    btn.style.background = c;
    btn.onclick = () => {
      document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedColor = c;
    };
    picker.appendChild(btn);
  });
}

// ── BUTTONS ──
function setupButtons() {
  document.getElementById('btnCreate').onclick = createRoom;
  document.getElementById('btnJoin').onclick   = joinRoom;
  document.getElementById('btnStart').onclick  = startGame;
  document.getElementById('btnLeave').onclick  = () => { leaveRoom(); showScreen('title'); };
  document.getElementById('btnReplay').onclick = () => { leaveRoom(); showScreen('title'); };
  document.getElementById('btnHome').onclick   = () => { leaveRoom(); showScreen('title'); };

  const dmap = { UP:'btnUp', DOWN:'btnDown', LEFT:'btnLeft', RIGHT:'btnRight' };
  Object.entries(dmap).forEach(([dir, id]) => {
    const btn = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev =>
      btn.addEventListener(ev, e => { e.preventDefault(); setDir(dir); btn.classList.add('pressed'); }));
    ['touchend','mouseup','mouseleave'].forEach(ev =>
      btn.addEventListener(ev, () => btn.classList.remove('pressed')));
  });
}

// ── INPUT ──
function setupInput() {
  document.addEventListener('keydown', e => {
    if (!gameRunning) return;
    const map = {
      ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT',
      w:'UP',s:'DOWN',a:'LEFT',d:'RIGHT',
      W:'UP',S:'DOWN',A:'LEFT',D:'RIGHT'
    };
    if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
  });

  document.addEventListener('mousemove', e => {
    if (!gameRunning || !canvas) return;
    const me = players[myId];
    if (!me?.alive) return;
    const cs = canvas.width / GRID;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
    const dx = mx - (me.x+0.5)*cs;
    const dy = my - (me.y+0.5)*cs;
    if (Math.abs(dx)<3 && Math.abs(dy)<3) return;
    mouseAngle = Math.atan2(dy, dx);
    const a = mouseAngle;
    let dir;
    if      (a > -Math.PI/4  && a <= Math.PI/4)  dir = 'RIGHT';
    else if (a > Math.PI/4   && a <= 3*Math.PI/4) dir = 'DOWN';
    else if (a > -3*Math.PI/4 && a <= -Math.PI/4) dir = 'UP';
    else dir = 'LEFT';
    setDir(dir);
  });
}
function setDir(dir) {
  const opp = {UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
  if (opp[dir] !== myDir) pendingDir = dir;
}

// ── ROOM ──
function genCode() {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
async function createRoom() {
  const name = document.getElementById('playerName').value.trim()||'익명';
  roomId=genCode(); isHost=true; myId='p_'+Date.now();
  await set(ref(db,`rooms/${roomId}`),{status:'waiting',host:myId,created:Date.now()});
  await joinAsPlayer(name);
  showLobby();
}
async function joinRoom() {
  const name=document.getElementById('playerName').value.trim()||'익명';
  const code=document.getElementById('roomCode').value.trim().toUpperCase();
  if(code.length!==4){toast('방 코드 4자리를 입력하세요');return;}
  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){toast('방을 찾을 수 없어요');return;}
  if(snap.val().status!=='waiting'){toast('이미 게임 중인 방이에요');return;}
  const ps=await get(ref(db,`rooms/${code}/players`));
  if(ps.exists()&&Object.keys(ps.val()).length>=6){toast('방이 가득 찼어요');return;}
  roomId=code; isHost=false; myId='p_'+Date.now();
  await joinAsPlayer(name);
  showLobby();
}
async function joinAsPlayer(name) {
  const snap=await get(ref(db,`rooms/${roomId}/players`));
  const used=snap.exists()?Object.values(snap.val()).map(p=>p.color):[];
  const color=!used.includes(selectedColor)?selectedColor:(PLAYER_COLORS.find(c=>!used.includes(c))||PLAYER_COLORS[0]);
  const pr=ref(db,`rooms/${roomId}/players/${myId}`);
  await set(pr,{name,color,alive:true,score:0});
  onDisconnect(pr).remove();
  onDisconnect(ref(db,`rooms/${roomId}/inputs/${myId}`)).remove();
}
function showLobby() {
  document.getElementById('displayRoomCode').textContent=roomId;
  document.getElementById('btnStart').style.display=isHost?'block':'none';
  showScreen('lobby');
  onValue(ref(db,`rooms/${roomId}/players`),snap=>renderPlayerList(snap.val()||{}));
  onValue(ref(db,`rooms/${roomId}/status`),snap=>{
    if(snap.val()==='countdown') startCountdown();
    if(snap.val()==='playing')   initGame();
  });
}
function renderPlayerList(data) {
  const list=document.getElementById('playerList'); list.innerHTML='';
  Object.entries(data).forEach(([id,p])=>{
    const div=document.createElement('div');
    div.className='player-item';
    div.innerHTML=`<div class="player-dot" style="background:${p.color}"></div>
      <span class="player-name">${p.name}</span>
      ${id===myId?'<span class="player-badge">나</span>':''}`;
    list.appendChild(div);
  });
  const n=Object.keys(data).length;
  document.getElementById('lobbyStatus').textContent=
    `${n}명 입장 중 · ${isHost?'시작 버튼을 누르세요':'호스트 대기 중'}`;
}

// ── START ──
async function startGame() {
  if(!isHost) return;
  const snap=await get(ref(db,`rooms/${roomId}/players`));
  if(!snap.exists()){toast('플레이어가 없어요');return;}
  const pData=snap.val(), pIds=Object.keys(pData);
  const starts=genStarts(pIds.length);
  const flatGrid=new Array(GRID*GRID).fill(null);
  const gs={grid:flatGrid,players:{},tick:0};
  pIds.forEach((id,i)=>{
    const [sx,sy]=starts[i], p=pData[id];
    for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++){
      const nx=sx+dx,ny=sy+dy;
      if(nx>=0&&nx<GRID&&ny>=0&&ny<GRID) flatGrid[ny*GRID+nx]=p.color;
    }
    gs.players[id]={name:p.name,color:p.color,x:sx,y:sy,dir:'RIGHT',trail:[],alive:true,score:25};
  });
  await set(ref(db,`rooms/${roomId}/gameState`),gs);
  await update(ref(db,`rooms/${roomId}`),{status:'countdown',startTime:Date.now()+3500});
}
function genStarts(n){
  const m=12;
  return[[m,m],[GRID-m,GRID-m],[GRID-m,m],[m,GRID-m],
         [Math.floor(GRID/2),m],[Math.floor(GRID/2),GRID-m]].slice(0,n);
}

// ── COUNTDOWN ──
function startCountdown(){
  const overlay=document.getElementById('countdown');
  const num=document.getElementById('countdown-num');
  showScreen('game');
  overlay.classList.add('show');
  let c=3; num.textContent=c;
  const iv=setInterval(()=>{
    c--;
    if(c<=0){clearInterval(iv);num.textContent='GO!';setTimeout(()=>overlay.classList.remove('show'),600);}
    else{num.textContent=c;num.style.animation='none';requestAnimationFrame(()=>{num.style.animation='countPop .8s ease';});}
  },1000);
}

// ── GAME INIT ──
function initGame(){
  off(ref(db,`rooms/${roomId}/players`));
  gameRunning=true; timeLeft=GAME_DURATION; particles=[];

  resizeCanvas(); 

  onValue(ref(db,`rooms/${roomId}/gameState`),snap=>{
    if(!snap.exists()) return;
    const gs=snap.val();
    const prev={...players};
    grid=gs.grid; players=gs.players||{};
    Object.entries(players).forEach(([id,p])=>{
      if(prev[id]?.alive && !p.alive) spawnExplosion(p.x,p.y,p.color);
    });
    renderGame();
    updateHUD();
    updateLeaderboard();
    const alive=Object.values(players).filter(p=>p.alive);
    if(alive.length<=1&&Object.keys(players).length>1) endGame();
  });

  if(isHost){
    gameLoopInterval=setInterval(gameTick,TICK_MS);
    timerInterval=setInterval(()=>{ timeLeft--; if(timeLeft<=0) endGame(); },1000);
  } else {
    get(ref(db,`rooms/${roomId}/startTime`)).then(snap=>{
      if(snap.exists()) timeLeft=Math.max(0,GAME_DURATION-Math.floor((Date.now()-snap.val())/1000));
    });
    timerInterval=setInterval(()=>{ timeLeft=Math.max(0,timeLeft-1); },1000);
  }

  setInterval(async()=>{
    if(!gameRunning||!roomId||!myId||!pendingDir) return;
    await set(ref(db,`rooms/${roomId}/inputs/${myId}`),{dir:pendingDir});
    myDir=pendingDir; pendingDir=null;
  },50);

  requestAnimationFrame(particleLoop);
}

// ── GAME TICK (HOST) ──
const DIRS={UP:[0,-1],DOWN:[0,1],LEFT:[-1,0],RIGHT:[1,0]};
const OPP={UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};

async function gameTick(){
  if(!gameRunning) return;
  const [inSnap,gsSnap]=await Promise.all([
    get(ref(db,`rooms/${roomId}/inputs`)),
    get(ref(db,`rooms/${roomId}/gameState`))
  ]);
  if(!gsSnap.exists()) return;
  const gs=gsSnap.val(), lp=gs.players||{}, lg=gs.grid;
  const inputs=inSnap.exists()?inSnap.val():{};

  Object.entries(inputs).forEach(([pid,inp])=>{
    if(lp[pid]?.alive && inp.dir && OPP[inp.dir]!==lp[pid].dir) lp[pid].dir=inp.dir;
  });

  const newPos={};
  Object.entries(lp).forEach(([pid,p])=>{
    if(!p.alive) return;
    const [dx,dy]=DIRS[p.dir]||[1,0];
    const nx=p.x+dx, ny=p.y+dy;
    if(nx<0||nx>=GRID||ny<0||ny>=GRID){lp[pid].alive=false;return;}
    if(p.trail?.some(t=>t[0]===nx&&t[1]===ny)){lp[pid].alive=false;return;}
    newPos[pid]=[nx,ny];
  });

  Object.entries(newPos).forEach(([pid,[nx,ny]])=>{
    if(!lp[pid].alive) return;
    Object.entries(lp).forEach(([oid,op])=>{
      if(oid===pid||!op.alive) return;
      if(op.trail?.some(t=>t[0]===nx&&t[1]===ny)) lp[pid].alive=false;
    });
  });

  Object.entries(newPos).forEach(([pid,[nx,ny]])=>{
    if(!lp[pid].alive) return;
    const p=lp[pid];
    const inTerritory=lg[ny*GRID+nx]===p.color;
    if(inTerritory && p.trail?.length>0){
      fillTerritory(lg,p,lp);
      p.trail=[];
    } else if(!inTerritory){
      p.trail=p.trail||[];
      p.trail.push([p.x,p.y]);
    }
    p.x=nx; p.y=ny;
  });

  Object.keys(lp).forEach(pid=>{
    lp[pid].score=lg.filter(c=>c===lp[pid].color).length;
  });

  await update(ref(db,`rooms/${roomId}/gameState`),{grid:lg,players:lp,tick:(gs.tick||0)+1});
}

// ── FLOOD FILL ──
function fillTerritory(lg,p,lp){
  const trail=p.trail||[];
  if(!trail.length) return;
  trail.forEach(([tx,ty])=>{ lg[ty*GRID+tx]=p.color; });

  const outside=new Uint8Array(GRID*GRID);
  const queue=[];
  const push=(x,y)=>{
    if(x<0||x>=GRID||y<0||y>=GRID||outside[y*GRID+x]||lg[y*GRID+x]===p.color) return;
    outside[y*GRID+x]=1; queue.push(x,y);
  };
  for(let x=0;x<GRID;x++){push(x,0);push(x,GRID-1);}
  for(let y=0;y<GRID;y++){push(0,y);push(GRID-1,y);}
  while(queue.length){
    const y=queue.pop(),x=queue.pop();
    push(x+1,y);push(x-1,y);push(x,y+1);push(x,y-1);
  }
  for(let i=0;i<GRID*GRID;i++){
    if(!outside[i]) lg[i]=p.color;
  }
}

// ── PARTICLES ──
function spawnExplosion(gx,gy,color){
  const cs=canvas.width/GRID;
  const cx=(gx+0.5)*cs, cy=(gy+0.5)*cs;
  for(let i=0;i<32;i++){
    const angle=(Math.PI*2*i)/32+Math.random()*0.3;
    const speed=2+Math.random()*6;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      r:3+Math.random()*5,color,life:1});
  }
}
function particleLoop(){
  if(!gameRunning) return;
  pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.94;
    p.life-=0.028; p.r*=0.97;
    pCtx.globalAlpha=Math.max(0,p.life);
    pCtx.fillStyle=p.color;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2); pCtx.fill();
  });
  pCtx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
  requestAnimationFrame(particleLoop);
}

// ── RENDER ──
function resizeCanvas(){
  const size=Math.min(window.innerWidth,window.innerHeight);
  canvas.width=canvas.height=size;
  particleCanvas.width=particleCanvas.height=size;
}
window.addEventListener('resize',()=>{ if(gameRunning) resizeCanvas(); });

function hexToRgb(hex){
  if (!hex) return [0, 0, 0];
  if (typeof hex !== 'string') return [0, 0, 0];
  if (hex.charAt(0) !== '#') hex = '#' + hex;
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  return [isNaN(r)?0:r, isNaN(g)?0:g, isNaN(b)?0:b];
}

function renderGame(){
  if(!ctx || !grid || grid.length === 0) return; 
  const W=canvas.width, cs=W/GRID;

  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,W);

  ctx.strokeStyle='rgba(0,0,0,0.04)';
  ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*cs,0);ctx.lineTo(i*cs,W);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cs);ctx.lineTo(W,i*cs);ctx.stroke();
  }

  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      const color=grid[y*GRID+x];
      if(!color) continue;
      const [r,g,b]=hexToRgb(color);
      ctx.fillStyle=`rgba(${r},${g},${b},0.18)`;
      ctx.fillRect(x*cs,y*cs,cs,cs);
    }
  }

  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      const color=grid[y*GRID+x];
      if(!color) continue;
      const top    =y>0      ?grid[(y-1)*GRID+x]:null;
      const bottom =y<GRID-1 ?grid[(y+1)*GRID+x]:null;
      const left   =x>0      ?grid[y*GRID+x-1]:null;
      const right  =x<GRID-1 ?grid[y*GRID+x+1]:null;
      ctx.strokeStyle=color;
      ctx.lineWidth=2;
      if(top!==color){ctx.beginPath();ctx.moveTo(x*cs,y*cs);ctx.lineTo((x+1)*cs,y*cs);ctx.stroke();}
      if(bottom!==color){ctx.beginPath();ctx.moveTo(x*cs,(y+1)*cs);ctx.lineTo((x+1)*cs,(y+1)*cs);ctx.stroke();}
      if(left!==color){ctx.beginPath();ctx.moveTo(x*cs,y*cs);ctx.lineTo(x*cs,(y+1)*cs);ctx.stroke();}
      if(right!==color){ctx.beginPath();ctx.moveTo((x+1)*cs,y*cs);ctx.lineTo((x+1)*cs,(y+1)*cs);ctx.stroke();}
    }
  }

  Object.values(players).forEach(p=>{
    if(!p.alive||!p.trail?.length) return;
    ctx.strokeStyle=p.color;
    ctx.lineWidth=cs*0.55;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.globalAlpha=0.85;
    ctx.beginPath();
    const all=[...p.trail,[p.x,p.y]];
    ctx.moveTo((all[0][0]+0.5)*cs,(all[0][1]+0.5)*cs);
    for(let i=1;i<all.length;i++)
      ctx.lineTo((all[i][0]+0.5)*cs,(all[i][1]+0.5)*cs);
    ctx.stroke();
    ctx.globalAlpha=1;
  });

  Object.entries(players).forEach(([id,p])=>{
    if(!p.alive) return;
    const isMe=id===myId;
    const px=(p.x+0.5)*cs, py=(p.y+0.5)*cs;
    const r=cs*0.48;

    ctx.shadowColor='rgba(0,0,0,0.18)';
    ctx.shadowBlur=6;

    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(px,py,r+2,0,Math.PI*2); ctx.fill();

    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();

    ctx.shadowBlur=0;

    if(isMe){
      ctx.strokeStyle='rgba(0,0,0,0.25)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(px,py,r+3,0,Math.PI*2); ctx.stroke();
    }

    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(8,cs*0.58)}px 'Noto Sans KR',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.name ? p.name.charAt(0) : '익', px, py);
  });

  const me=players[myId];
  if(me?.alive){
    const px=(me.x+0.5)*cs, py=(me.y+0.5)*cs;
    const [r,g,b]=hexToRgb(me.color);
    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(mouseAngle);
    ctx.fillStyle=`rgba(${r},${g},${b},0.5)`;
    ctx.beginPath();
    ctx.moveTo(cs*1.3,0);
    ctx.lineTo(cs*0.8,-cs*0.22);
    ctx.lineTo(cs*0.8, cs*0.22);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ── HUD ──
function updateHUD(){
  const me=players[myId]; if(!me) return;
  document.getElementById('hud-name').textContent=me.name;
  document.getElementById('hud-name').style.color=me.color;
  const total=GRID*GRID;
  const pct=((me.score/total)*100).toFixed(1);
  document.getElementById('hud-score').textContent=`${pct}%`;
  document.getElementById('hud-score').style.color=me.color;
  document.getElementById('hud-time').textContent=formatTime(timeLeft);
  const sorted=Object.values(players).sort((a,b)=>b.score-a.score);
  const rank=sorted.findIndex(p=>p.color===me.color)+1;
  const rankEl=document.getElementById('hud-rank');
  rankEl.textContent=`${rank}위`;
  rankEl.className='hud-rank rank'+Math.min(rank,4);
}
function updateLeaderboard(){
  const lb=document.getElementById('lb-list'); lb.innerHTML='';
  const sorted=Object.values(players).sort((a,b)=>b.score-a.score).slice(0,6);
  const total=GRID*GRID;
  sorted.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='lb-item'+(p.alive?'':' dead');
    const pct=((p.score/total)*100).toFixed(1);
    div.innerHTML=`<span class="lb-num">${i+1}</span>
      <div class="lb-dot" style="background:${p.color}"></div>
      <span class="lb-name">${p.name}</span>
      <span class="lb-pct" style="color:${p.color}">${pct}%</span>`;
    lb.appendChild(div);
  });
}
function formatTime(s){
  s=Math.max(0,s);
  return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

// ── END ──
function endGame(){
  if(!gameRunning) return;
  gameRunning=false;
  clearInterval(gameLoopInterval); clearInterval(timerInterval);
  off(ref(db,`rooms/${roomId}/gameState`));
  if(isHost) update(ref(db,`rooms/${roomId}`),{status:'ended'});
  const total=GRID*GRID;
  const sorted=Object.values(players).sort((a,b)=>b.score-a.score);
  const me=players[myId];
  const myRank=sorted.findIndex(p=>p.color===me?.color)+1;
  document.getElementById('resultTitle').textContent=myRank===1?'🏆 우승!':`${myRank}위`;
  document.getElementById('resultTitle').className='result-title '+(myRank===1?'win':'lose');
  document.getElementById('resultStats').innerHTML=sorted.map((p,i)=>
    `<div class="stat-row">
      <span>${i+1}위 <span style="color:${p.color}">${p.name}</span></span>
      <span style="color:${p.color}">${((p.score/total)*100).toFixed(1)}%</span>
    </div>`
  ).join('');
  showScreen('gameover');
}
async function leaveRoom(){
  gameRunning=false;
  clearInterval(gameLoopInterval); clearInterval(timerInterval);
  if(roomId&&myId){
    try{
      await remove(ref(db,`rooms/${roomId}/players/${myId}`));
      await remove(ref(db,`rooms/${roomId}/inputs/${myId}`));
    }catch(e){}
  }
  roomId=null; myId=null; isHost=false;
}
</script>
