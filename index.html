<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper.io Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --accent: #00ffcc;
    --danger: #ff3366;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen { display: none; width: 100%; max-width: 480px; padding: 24px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  #screen-title { gap: 20px; }
  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 3rem;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), #00aaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.75} }
  .subtitle { color: var(--muted); font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; }

  .input-group { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  label { font-size: .72rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  input[type=text] {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-size: 1rem; font-family: inherit; outline: none; transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  /* color + bg pickers */
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .color-btn.selected { border-color: white; transform: scale(1.2); }

  .bg-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .bg-btn {
    width: 34px; height: 34px; border-radius: 6px;
    border: 3px solid transparent; cursor: pointer;
    transition: transform .15s, border-color .15s;
    position: relative;
  }
  .bg-btn.selected { border-color: white; transform: scale(1.15); }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 1rem; font-family: 'Black Han Sans', sans-serif;
    cursor: pointer; letter-spacing: 1px; transition: transform .1s, opacity .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* LOBBY */
  .room-code-display {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; width: 100%; text-align: center;
  }
  .room-code-display .label { font-size: .68rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
  .room-code-display .code {
    font-family: 'Black Han Sans', sans-serif; font-size: 2.4rem;
    letter-spacing: 8px; color: var(--accent);
  }
  .player-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .player-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; animation: slideIn .2s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
  .player-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
  .player-name { flex: 1; font-size: .92rem; }
  .player-badge { font-size: .62rem; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }
  .status-msg { font-size: .78rem; color: var(--muted); text-align: center; }

  /* GAME */
  #screen-game {
    display: none; width: 100vw; max-width: 100vw;
    height: 100vh; padding: 0; position: relative; flex-direction: column;
  }
  #screen-game.active { display: flex; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px;
    background: rgba(10,10,15,.75);
    backdrop-filter: blur(8px);
    z-index: 20; pointer-events: none;
    gap: 10px;
  }
  #hud-left { display: flex; align-items: center; gap: 8px; }
  #hud-name { font-family: 'Black Han Sans', sans-serif; font-size: .95rem; }
  #hud-rank {
    background: rgba(255,255,255,.1); border-radius: 20px;
    padding: 2px 10px; font-size: .75rem; font-weight: 700; color: #fff;
  }
  #hud-rank.rank1 { background: linear-gradient(90deg,#ffd700,#ffaa00); color: #000; }
  #hud-rank.rank2 { background: linear-gradient(90deg,#c0c0c0,#909090); color: #000; }
  #hud-rank.rank3 { background: linear-gradient(90deg,#cd7f32,#a05020); color: #fff; }
  #hud-score { font-size: .85rem; color: var(--accent); font-weight: 700; }
  #hud-time { font-size: .85rem; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* LEADERBOARD */
  #leaderboard {
    position: absolute; top: 48px; right: 10px;
    background: rgba(12,12,20,.88);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px; padding: 10px 14px; min-width: 150px;
    z-index: 20; pointer-events: none;
    backdrop-filter: blur(6px);
  }
  #leaderboard h4 { font-size: .6rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
  .lb-item {
    display: flex; align-items: center; gap: 7px;
    font-size: .78rem; margin-bottom: 5px; transition: opacity .3s;
  }
  .lb-item.dead { opacity: .4; }
  .lb-num { font-size: .65rem; color: var(--muted); width: 12px; text-align: right; }
  .lb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 72px; }
  .lb-pct { color: var(--accent); font-size: .72rem; font-weight: 700; }

  /* SCORE POPUP */
  .score-popup {
    position: absolute; pointer-events: none;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem; color: #fff;
    text-shadow: 0 0 8px rgba(0,255,200,.8);
    z-index: 30;
    animation: popUp .9s ease forwards;
  }
  @keyframes popUp {
    0% { opacity:1; transform: translateY(0) scale(1); }
    100% { opacity:0; transform: translateY(-40px) scale(1.4); }
  }

  canvas { display: block; width: 100%; height: 100%; cursor: none; touch-action: none; }

  /* D-PAD (mobile) */
  #dpad {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 4px; z-index: 20;
  }
  .dpad-btn {
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px; color: white; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent; transition: background .1s;
  }
  .dpad-btn.pressed { background: rgba(0,255,204,.2); border-color: var(--accent); }
  .dpad-empty { background: none; border: none; pointer-events: none; }

  /* GAME OVER */
  #screen-gameover { gap: 20px; }
  .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; text-align: center; }
  .result-title.win { color: var(--accent); }
  .result-title.lose { color: var(--danger); }
  .result-stats { width: 100%; }
  .stat-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: .88rem;
  }
  .stat-row span:last-child { color: var(--accent); font-weight: 700; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.88); color: var(--text);
    padding: 9px 18px; border-radius: 20px; font-size: .83rem;
    z-index: 999; pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  #toast.show { opacity: 1; }

  /* COUNTDOWN */
  #countdown {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; z-index: 50;
    background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
  }
  #countdown.show { display: flex; }
  #countdown-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 8rem; color: var(--accent);
    text-shadow: 0 0 40px rgba(0,255,204,.6);
    animation: countPop .8s ease;
  }
  @keyframes countPop {
    0% { transform: scale(2); opacity: 0; }
    50% { transform: scale(1); opacity: 1; }
    100% { transform: scale(.9); opacity: .7; }
  }
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, onDisconnect, update, remove, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJYWUGB3-onRqeuRORgqup9253DM4dVW4",
  authDomain: "mypaperio-9a975.firebaseapp.com",
  databaseURL: "https://mypaperio-9a975-default-rtdb.firebaseio.com",
  projectId: "mypaperio-9a975",
  storageBucket: "mypaperio-9a975.firebasestorage.app",
  messagingSenderId: "40231877042",
  appId: "1:40231877042:web:7ce90a3093a180a0ed0cab",
  measurementId: "G-YY2K417F5M"
};

// ───────────────── CONSTANTS ─────────────────
const GRID = 80;
const GAME_DURATION = 120;
const TICK_MS = 140;

const PLAYER_COLORS = ['#ff3366','#00ffcc','#ffcc00','#aa66ff','#ff6600','#00aaff'];
const BG_OPTIONS = [
  { color: '#0a0a0f', label: '블랙' },
  { color: '#0d1b2a', label: '네이비' },
  { color: '#1a0a0a', label: '다크레드' },
  { color: '#0a1a0a', label: '다크그린' },
  { color: '#1a1a2e', label: '미드나잇' },
  { color: '#2a2a2a', label: '다크그레이' },
];

// ───────────────── STATE ─────────────────────
let app, db;
let myId = null, roomId = null, isHost = false;
let gameLoopInterval = null, timerInterval = null;
let timeLeft = GAME_DURATION;
let myDir = 'RIGHT', pendingDir = null;
let players = {}, grid = [];
let gameRunning = false;
let bgColor = '#0a0a0f';
let selectedBg = '#0a0a0f';

// canvas & particles
let canvas, ctx;
let particles = []; // local explosion particles
let mouseAngle = 0; // radians from center to mouse

// ───────────────── INIT ──────────────────────
document.addEventListener('DOMContentLoaded', () => {
  try { app = initializeApp(firebaseConfig); db = getDatabase(app); }
  catch(e) { alert('Firebase 초기화 실패: ' + e.message); return; }

  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  setupColorPicker();
  setupBgPicker();
  setupButtons();
  setupInput();
  showScreen('title');
});

// ───────────────── UI ────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'game') resizeCanvas();
}

function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ───────────────── PICKERS ───────────────────
let selectedColor = PLAYER_COLORS[0];

function setupColorPicker() {
  const picker = document.getElementById('colorPicker');
  PLAYER_COLORS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (i === 0 ? ' selected' : '');
    btn.style.background = c;
    btn.onclick = () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedColor = c;
    };
    picker.appendChild(btn);
  });
}

function setupBgPicker() {
  const picker = document.getElementById('bgPicker');
  BG_OPTIONS.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'bg-btn' + (i === 0 ? ' selected' : '');
    btn.style.background = opt.color;
    btn.title = opt.label;
    btn.onclick = () => {
      document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedBg = opt.color;
    };
    picker.appendChild(btn);
  });
}

// ───────────────── BUTTONS ───────────────────
function setupButtons() {
  document.getElementById('btnCreate').onclick = createRoom;
  document.getElementById('btnJoin').onclick = joinRoom;
  document.getElementById('btnStart').onclick = startGame;
  document.getElementById('btnLeave').onclick = () => { leaveRoom(); showScreen('title'); };
  document.getElementById('btnReplay').onclick = () => { leaveRoom(); showScreen('title'); };
  document.getElementById('btnHome').onclick = () => { leaveRoom(); showScreen('title'); };

  const dpad = { UP:'btnUp', DOWN:'btnDown', LEFT:'btnLeft', RIGHT:'btnRight' };
  Object.entries(dpad).forEach(([dir, id]) => {
    const btn = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev =>
      btn.addEventListener(ev, e => { e.preventDefault(); setDir(dir); btn.classList.add('pressed'); }));
    ['touchend','mouseup','mouseleave'].forEach(ev =>
      btn.addEventListener(ev, () => btn.classList.remove('pressed')));
  });
}

// ───────────────── INPUT ─────────────────────
function setupInput() {
  // Keyboard
  document.addEventListener('keydown', e => {
    if (!gameRunning) return;
    const map = {
      ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT',
      w:'UP', s:'DOWN', a:'LEFT', d:'RIGHT',
      W:'UP', S:'DOWN', A:'LEFT', D:'RIGHT'
    };
    if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
  });

  // Mouse direction
  document.addEventListener('mousemove', e => {
    if (!gameRunning || !canvas) return;
    const me = players[myId];
    if (!me || !me.alive) return;
    const cs = canvas.width / GRID;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const px = (me.x + 0.5) * cs;
    const py = (me.y + 0.5) * cs;
    const dx = mx - px, dy = my - py;
    if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    mouseAngle = Math.atan2(dy, dx);
    // Convert angle to 4-dir
    const a = mouseAngle;
    let dir;
    if (a > -Math.PI/4 && a <= Math.PI/4) dir = 'RIGHT';
    else if (a > Math.PI/4 && a <= 3*Math.PI/4) dir = 'DOWN';
    else if (a > -3*Math.PI/4 && a <= -Math.PI/4) dir = 'UP';
    else dir = 'LEFT';
    setDir(dir);
  });
}

function setDir(dir) {
  const opp = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
  if (opp[dir] !== myDir) pendingDir = dir;
}

// ───────────────── ROOM ──────────────────────
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

async function createRoom() {
  const name = document.getElementById('playerName').value.trim() || '익명';
  roomId = genCode(); isHost = true; myId = 'p_' + Date.now();
  bgColor = selectedBg;
  await set(ref(db, `rooms/${roomId}`), { status:'waiting', host:myId, bg:bgColor, created:Date.now() });
  await joinAsPlayer(name);
  showLobby();
}

async function joinRoom() {
  const name = document.getElementById('playerName').value.trim() || '익명';
  const code = document.getElementById('roomCode').value.trim().toUpperCase();
  if (code.length !== 4) { toast('방 코드 4자리를 입력하세요'); return; }
  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { toast('방을 찾을 수 없어요'); return; }
  if (snap.val().status !== 'waiting') { toast('이미 게임 중인 방이에요'); return; }
  const ps = await get(ref(db, `rooms/${code}/players`));
  if (ps.exists() && Object.keys(ps.val()).length >= 6) { toast('방이 가득 찼어요'); return; }
  bgColor = snap.val().bg || '#0a0a0f';
  roomId = code; isHost = false; myId = 'p_' + Date.now();
  await joinAsPlayer(name);
  showLobby();
}

async function joinAsPlayer(name) {
  const snap = await get(ref(db, `rooms/${roomId}/players`));
  const used = snap.exists() ? Object.values(snap.val()).map(p => p.color) : [];
  const color = !used.includes(selectedColor) ? selectedColor : (PLAYER_COLORS.find(c => !used.includes(c)) || PLAYER_COLORS[0]);
  const pr = ref(db, `rooms/${roomId}/players/${myId}`);
  await set(pr, { name, color, alive:true, score:0 });
  onDisconnect(pr).remove();
  onDisconnect(ref(db, `rooms/${roomId}/inputs/${myId}`)).remove();
}

function showLobby() {
  document.getElementById('displayRoomCode').textContent = roomId;
  document.getElementById('btnStart').style.display = isHost ? 'block' : 'none';
  showScreen('lobby');
  onValue(ref(db, `rooms/${roomId}/players`), snap => renderPlayerList(snap.val() || {}));
  onValue(ref(db, `rooms/${roomId}/status`), snap => {
    if (snap.val() === 'countdown') startCountdown();
    if (snap.val() === 'playing') initGame();
  });
}

function renderPlayerList(data) {
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  Object.entries(data).forEach(([id, p]) => {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `<div class="player-dot" style="background:${p.color}"></div>
      <span class="player-name">${p.name}</span>
      ${id === myId ? '<span class="player-badge">나</span>' : ''}`;
    list.appendChild(div);
  });
  const n = Object.keys(data).length;
  document.getElementById('lobbyStatus').textContent =
    `${n}명 입장 중 · ${isHost ? '시작 버튼을 누르세요' : '호스트 대기 중'}`;
}

// ───────────────── START ─────────────────────
async function startGame() {
  if (!isHost) return;
  const snap = await get(ref(db, `rooms/${roomId}/players`));
  if (!snap.exists()) { toast('플레이어가 없어요'); return; }
  const pData = snap.val();
  const pIds = Object.keys(pData);
  const starts = genStarts(pIds.length);
  const flatGrid = new Array(GRID * GRID).fill(null);
  const gs = { grid: flatGrid, players: {}, tick: 0 };

  pIds.forEach((id, i) => {
    const [sx, sy] = starts[i];
    const p = pData[id];
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      const nx = sx+dx, ny = sy+dy;
      if (nx>=0&&nx<GRID&&ny>=0&&ny<GRID) flatGrid[ny*GRID+nx] = p.color;
    }
    gs.players[id] = { name:p.name, color:p.color, x:sx, y:sy, dir:'RIGHT', trail:[], alive:true, score:9 };
  });

  await set(ref(db, `rooms/${roomId}/gameState`), gs);
  await update(ref(db, `rooms/${roomId}`), { status:'countdown', startTime: Date.now() + 3500 });
}

function genStarts(n) {
  const m = 10;
  return [
    [m, m], [GRID-m, GRID-m], [GRID-m, m], [m, GRID-m],
    [Math.floor(GRID/2), m], [Math.floor(GRID/2), GRID-m]
  ].slice(0, n);
}

// ───────────────── COUNTDOWN ─────────────────
function startCountdown() {
  const overlay = document.getElementById('countdown');
  const num = document.getElementById('countdown-num');
  showScreen('game');
  overlay.classList.add('show');

  // Apply bg
  canvas.style.background = bgColor;
  document.body.style.background = bgColor;

  let c = 3;
  num.textContent = c;
  const iv = setInterval(() => {
    c--;
    if (c <= 0) {
      clearInterval(iv);
      num.textContent = 'GO!';
      setTimeout(() => overlay.classList.remove('show'), 600);
    } else {
      num.textContent = c;
      num.style.animation = 'none';
      requestAnimationFrame(() => { num.style.animation = 'countPop .8s ease'; });
    }
  }, 1000);
}

// ───────────────── GAME INIT ─────────────────
function initGame() {
  off(ref(db, `rooms/${roomId}/players`));
  gameRunning = true; timeLeft = GAME_DURATION;
  particles = [];
  pendingDir = null;

  onValue(ref(db, `rooms/${roomId}/gameState`), snap => {
    if (!snap.exists()) return;
    const gs = snap.val();
    const prevPlayers = { ...players };
    grid = gs.grid;
    players = gs.players || {};

    // Detect newly dead → spawn explosion
    Object.entries(players).forEach(([id, p]) => {
      const prev = prevPlayers[id];
      if (prev && prev.alive && !p.alive) spawnExplosion(p.x, p.y, p.color);
    });

    render();
    updateHUD();
    updateLeaderboard();

    const alive = Object.values(players).filter(p => p.alive);
    if (alive.length <= 1 && Object.keys(players).length > 1) endGame();
  });

  if (isHost) {
    gameLoopInterval = setInterval(gameTick, TICK_MS);
    timerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) endGame();
    }, 1000);
  } else {
    get(ref(db, `rooms/${roomId}/startTime`)).then(snap => {
      if (snap.exists()) timeLeft = Math.max(0, GAME_DURATION - Math.floor((Date.now() - snap.val()) / 1000));
    });
    timerInterval = setInterval(() => { timeLeft = Math.max(0, timeLeft - 1); }, 1000);
  }

  // Input upload loop
  setInterval(async () => {
    if (!gameRunning || !roomId || !myId || !pendingDir) return;
    await set(ref(db, `rooms/${roomId}/inputs/${myId}`), { dir: pendingDir });
    myDir = pendingDir; pendingDir = null;
  }, 50);

  requestAnimationFrame(particleLoop);
}

// ───────────────── GAME TICK (HOST) ──────────
const DIRS = { UP:[0,-1], DOWN:[0,1], LEFT:[-1,0], RIGHT:[1,0] };

async function gameTick() {
  if (!gameRunning) return;
  const [inSnap, gsSnap] = await Promise.all([
    get(ref(db, `rooms/${roomId}/inputs`)),
    get(ref(db, `rooms/${roomId}/gameState`))
  ]);
  if (!gsSnap.exists()) return;
  const gs = gsSnap.val();
  const lp = gs.players || {};
  const lg = gs.grid;
  const inputs = inSnap.exists() ? inSnap.val() : {};

  const opp = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };

  // Apply inputs
  Object.entries(inputs).forEach(([pid, inp]) => {
    if (lp[pid]?.alive && inp.dir && opp[inp.dir] !== lp[pid].dir)
      lp[pid].dir = inp.dir;
  });

  // Move
  const newPos = {};
  Object.entries(lp).forEach(([pid, p]) => {
    if (!p.alive) return;
    const [dx, dy] = DIRS[p.dir] || [1,0];
    const nx = p.x+dx, ny = p.y+dy;
    if (nx<0||nx>=GRID||ny<0||ny>=GRID) { lp[pid].alive=false; return; }
    if (p.trail?.some(t => t[0]===nx && t[1]===ny)) { lp[pid].alive=false; return; }
    newPos[pid] = [nx, ny];
  });

  // Cross-trail collision
  Object.entries(newPos).forEach(([pid, [nx,ny]]) => {
    if (!lp[pid].alive) return;
    Object.entries(lp).forEach(([oid, op]) => {
      if (oid===pid||!op.alive) return;
      if (op.trail?.some(t => t[0]===nx && t[1]===ny)) lp[pid].alive=false;
    });
  });

  // Apply moves
  Object.entries(newPos).forEach(([pid, [nx,ny]]) => {
    if (!lp[pid].alive) return;
    const p = lp[pid];
    const inTerritory = lg[ny*GRID+nx] === p.color;
    if (inTerritory && p.trail?.length > 0) {
      fillTerritory(lg, p, lp);
      p.trail = [];
    } else if (!inTerritory) {
      p.trail = p.trail || [];
      p.trail.push([p.x, p.y]);
    }
    p.x = nx; p.y = ny;
  });

  // Score
  Object.keys(lp).forEach(pid => {
    lp[pid].score = lg.filter(c => c === lp[pid].color).length;
  });

  await update(ref(db, `rooms/${roomId}/gameState`), { grid:lg, players:lp, tick:(gs.tick||0)+1 });
}

function fillTerritory(localGrid, p, lp) {
  const trail = p.trail || [];
  if (!trail.length) return;

  // Mark trail
  trail.forEach(([tx,ty]) => { localGrid[ty*GRID+tx] = p.color; });

  // Remove enemy trails inside newly enclosed area (land grab!)
  const outside = new Uint8Array(GRID*GRID);
  const queue = [];
  const push = (x,y) => {
    const idx = y*GRID+x;
    if (x<0||x>=GRID||y<0||y>=GRID||outside[idx]||localGrid[idx]===p.color) return;
    outside[idx]=1; queue.push(x,y);
  };
  for (let x=0;x<GRID;x++) { push(x,0); push(x,GRID-1); }
  for (let y=0;y<GRID;y++) { push(0,y); push(GRID-1,y); }
  while (queue.length) {
    const y=queue.pop(), x=queue.pop();
    push(x+1,y); push(x-1,y); push(x,y+1); push(x,y-1);
  }
  for (let i=0;i<GRID*GRID;i++) {
    if (!outside[i]) {
      localGrid[i] = p.color;
      // Remove other player trails inside area
      Object.entries(lp).forEach(([oid, op]) => {
        if (oid !== p.name && op.trail) {
          const ix = i % GRID, iy = Math.floor(i/GRID);
          op.trail = op.trail.filter(([tx,ty]) => !(tx===ix && ty===iy));
        }
      });
    }
  }
}

// ───────────────── PARTICLES ─────────────────
function spawnExplosion(gx, gy, color) {
  const cs = canvas.width / GRID;
  const cx = (gx + 0.5) * cs, cy = (gy + 0.5) * cs;
  for (let i = 0; i < 28; i++) {
    const angle = (Math.PI * 2 * i) / 28 + Math.random() * 0.3;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 3 + Math.random() * 5,
      color, alpha: 1,
      life: 1
    });
  }
}

function particleLoop() {
  if (!gameRunning) return;
  // Just re-render if particles active
  if (particles.length > 0) {
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15;
      p.vx *= 0.95;
      p.life -= 0.025;
      p.alpha = p.life;
      p.r *= 0.97;
    });
    particles = particles.filter(p => p.life > 0);
    render();
  }
  requestAnimationFrame(particleLoop);
}

// ───────────────── RENDER ────────────────────
function resizeCanvas() {
  const size = Math.min(window.innerWidth, window.innerHeight);
  canvas.width = canvas.height = size;
  canvas.style.background = bgColor;
}
window.addEventListener('resize', () => { if (gameRunning) resizeCanvas(); });

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function render() {
  if (!ctx || !grid) return;
  const W = canvas.width;
  const cs = W / GRID;

  // BG
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, W);

  // Territory
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      const color = grid[y*GRID+x];
      if (!color) continue;
      // bright fill
      ctx.fillStyle = color + 'bb';
      ctx.fillRect(x*cs, y*cs, cs, cs);
    }
  }

  // Territory borders (outline cells)
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      const color = grid[y*GRID+x];
      if (!color) continue;
      const neighbors = [
        y>0 ? grid[(y-1)*GRID+x] : null,
        y<GRID-1 ? grid[(y+1)*GRID+x] : null,
        x>0 ? grid[y*GRID+x-1] : null,
        x<GRID-1 ? grid[y*GRID+x+1] : null,
      ];
      if (neighbors.some(n => n !== color)) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x*cs+0.75, y*cs+0.75, cs-1.5, cs-1.5);
      }
    }
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*cs,0); ctx.lineTo(i*cs,W); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*cs); ctx.lineTo(W,i*cs); ctx.stroke();
  }

  // Trails
  Object.values(players).forEach(p => {
    if (!p.alive || !p.trail?.length) return;
    const [r,g,b] = hexToRgb(p.color);
    p.trail.forEach(([tx,ty], i) => {
      const alpha = 0.5 + 0.5 * (i / p.trail.length);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      const pad = 1;
      ctx.fillRect(tx*cs+pad, ty*cs+pad, cs-pad*2, cs-pad*2);
    });
  });

  // Players
  Object.entries(players).forEach(([id, p]) => {
    if (!p.alive) return;
    const isMe = id === myId;
    const px = (p.x+0.5)*cs, py = (p.y+0.5)*cs;
    const r = cs * 0.42;

    // Glow
    if (isMe) {
      const grd = ctx.createRadialGradient(px, py, 0, px, py, r*2.2);
      grd.addColorStop(0, p.color + '55');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(px, py, r*2.2, 0, Math.PI*2); ctx.fill();
    }

    // Head
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();

    if (isMe) {
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Initial
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(8, cs*0.62)}px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.name.charAt(0), px, py);
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // My cursor arrow
  const me = players[myId];
  if (me?.alive) {
    const px = (me.x+0.5)*cs, py = (me.y+0.5)*cs;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(mouseAngle);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(cs*1.2, 0);
    ctx.lineTo(cs*0.7, -cs*0.25);
    ctx.lineTo(cs*0.7, cs*0.25);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ───────────────── HUD ───────────────────────
function updateHUD() {
  const me = players[myId]; if (!me) return;
  document.getElementById('hud-name').textContent = me.name;
  document.getElementById('hud-name').style.color = me.color;
  const total = GRID*GRID;
  const pct = ((me.score/total)*100).toFixed(1);
  document.getElementById('hud-score').textContent = `${pct}%`;
  document.getElementById('hud-time').textContent = formatTime(timeLeft);

  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);
  const rank = sorted.findIndex(p=>p.color===me.color)+1;
  const rankEl = document.getElementById('hud-rank');
  rankEl.textContent = `${rank}위`;
  rankEl.className = 'hud-rank rank' + Math.min(rank, 4);
}

function updateLeaderboard() {
  const lb = document.getElementById('lb-list'); lb.innerHTML='';
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score).slice(0,6);
  const total = GRID*GRID;
  sorted.forEach((p,i) => {
    const div = document.createElement('div');
    div.className = 'lb-item' + (p.alive ? '' : ' dead');
    const pct = ((p.score/total)*100).toFixed(1);
    div.innerHTML = `<span class="lb-num">${i+1}</span>
      <div class="lb-dot" style="background:${p.color}"></div>
      <span class="lb-name">${p.name}</span>
      <span class="lb-pct">${pct}%</span>`;
    lb.appendChild(div);
  });
}

function formatTime(s) {
  s = Math.max(0, s);
  return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

// ───────────────── GAME END ──────────────────
function endGame() {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(gameLoopInterval); clearInterval(timerInterval);
  off(ref(db, `rooms/${roomId}/gameState`));
  if (isHost) update(ref(db, `rooms/${roomId}`), { status:'ended' });

  const total = GRID*GRID;
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);
  const me = players[myId];
  const myRank = sorted.findIndex(p=>p.color===me?.color)+1;

  document.getElementById('resultTitle').textContent = myRank===1 ? '🏆 우승!' : `${myRank}위`;
  document.getElementById('resultTitle').className = 'result-title ' + (myRank===1 ? 'win' : 'lose');
  document.getElementById('resultStats').innerHTML = sorted.map((p,i) =>
    `<div class="stat-row">
      <span>${i+1}위 <span style="color:${p.color}">${p.name}</span></span>
      <span>${((p.score/total)*100).toFixed(1)}%</span>
    </div>`
  ).join('');
  showScreen('gameover');
}

async function leaveRoom() {
  gameRunning = false;
  clearInterval(gameLoopInterval); clearInterval(timerInterval);
  if (roomId && myId) {
    try {
      await remove(ref(db, `rooms/${roomId}/players/${myId}`));
      await remove(ref(db, `rooms/${roomId}/inputs/${myId}`));
    } catch(e) {}
  }
  roomId=null; myId=null; isHost=false;
  document.body.style.background='var(--bg)';
}
</script>
